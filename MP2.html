const FALLBACK_PRODUCT_IMAGE = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 800'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='%23f5f5f5'/><stop offset='100%' stop-color='%23ffe0b2'/></linearGradient></defs><rect width='800' height='800' fill='url(%23g)'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' fill='%236b6b6b' font-family='Arial, sans-serif' font-size='36' font-weight='700'>Image Unavailable</text></svg>";

const normalizeProductImagePath = (path) => {
  if (!path) return FALLBACK_PRODUCT_IMAGE;
  if (path.startsWith('/products/')) return path;
  if (path.startsWith('./products/')) return path;
  if (path.startsWith('../products/')) return path;
  if (path.startsWith('products/')) return `./${path}`;
  if (path.startsWith('/public/products/')) return path;
  if (path.startsWith('./public/products/')) return path;
  if (path.startsWith('../public/products/')) return path;
  return path;
};

const getProductImageCandidates = (path) => {
  const normalized = normalizeProductImagePath(path);
  const filename = (normalized.split('/').pop() || '').trim();

  if (!filename) {
    return [FALLBACK_PRODUCT_IMAGE];
  }

  return [
    `/products/${filename}`,
    `./products/${filename}`,
    `products/${filename}`,
    `/public/products/${filename}`,
    `./public/products/${filename}`,
  ];
};

const validateProductImagePath = (path, productName) => {
  const normalized = normalizeProductImagePath(path);
  const filename = normalized.split('/').pop() || '';

  if (!normalized.startsWith('/products/')) {
    console.warn(`[Products] ${productName}: image path should start with /products/. Received: ${path}`);
  }

  if (filename && filename !== filename.toLowerCase()) {
    console.warn(`[Products] ${productName}: filename should be lowercase for case-sensitive environments. Received: ${filename}`);
  }

  if (filename && !REQUIRED_PRODUCT_FILENAMES.includes(filename.toLowerCase())) {
    console.warn(`[Products] ${productName}: filename not in expected list. Received: ${filename}`);
  }

  console.info(`[Products] ${productName}: loading from ${normalized}`);
  return normalized;
};

function ProductImage({ src, alt, className, style, fit = 'cover' }) {
  const [candidateIndex, setCandidateIndex] = useState(0);
  const candidates = getProductImageCandidates(src);
  const resolvedSrc = candidates[Math.min(candidateIndex, candidates.length - 1)] || FALLBACK_PRODUCT_IMAGE;

  useEffect(() => {
    setCandidateIndex(0);
  }, [src]);

  return (
    <img
      src={resolvedSrc}
      alt={alt}
      className={className}
      style={{ ...style, objectFit: fit }}
      loading="lazy"
      onError={(e) => {
        const nextIndex = candidateIndex + 1;

        if (nextIndex < candidates.length) {
          console.warn(`[Products] failed: ${resolvedSrc}. Retrying with ${candidates[nextIndex]}`);
          setCandidateIndex(nextIndex);
          return;
        }

        console.error(`[Products] failed to load all candidates for ${alt}. Falling back to placeholder.`);
        e.currentTarget.onerror = null;
        e.currentTarget.src = FALLBACK_PRODUCT_IMAGE;
      }}
    />
  );
}

              {Icon:PhoneIcon,label:'Phone',value:'+91 98765 43210',sub:'Mon–Sat 9am–7pm IST'},
              {Icon:MailIcon,label:'Email',value:'hello@mypainzone.in',sub:'We reply within 2 hours'},
              {Icon:MapPin,label:'Location',value:'Pune, Maharashtra',sub:'India • Online Consultations Available'},
            ].map(({Icon,label,value,sub}) => (
              <div key={label} style={{display:'flex',gap:'16px',alignItems:'flex-start',marginBottom:'32px'}}>
                <div style={{
                  width:'48px',height:'48px',borderRadius:'14px',
                  background:'#FFF3E0',display:'flex',alignItems:'center',justifyContent:'center',
                  color:'#FFA726',flexShrink:0
                }}><Icon /></div>
                <div>
                  <div style={{fontSize:'0.72rem',fontWeight:'700',letterSpacing:'0.15em',textTransform:'uppercase',color:'#9E9E9E',marginBottom:'4px'}}>{label}</div>
                  <div style={{fontWeight:'700',fontSize:'1rem',marginBottom:'2px'}}>{value}</div>
                  <div style={{fontSize:'0.82rem',color:'#9E9E9E'}}>{sub}</div>
                </div>
              </div>
            ))}

            <div style={{marginTop:'32px'}}>
              <h3 style={{fontFamily:'Bebas Neue,cursive',fontSize:'1.1rem',letterSpacing:'0.1em',marginBottom:'16px',color:'#9E9E9E'}}>FOLLOW US</h3>
              <div style={{display:'flex',gap:'12px'}}>
                {[['📘','Facebook'],['📸','Instagram'],['▶️','YouTube'],['💬','WhatsApp']].map(([icon,name]) => (
                  <button key={name} title={name} style={{
                    width:'48px',height:'48px',borderRadius:'14px',border:'1px solid #e0e0e0',
                    background:'#fff',cursor:'pointer',fontSize:'20px',
                    display:'flex',alignItems:'center',justifyContent:'center',
                    transition:'all 0.2s'
                  }} onMouseEnter={e=>{e.currentTarget.style.background='#FFA726';e.currentTarget.style.borderColor='#FFA726';}}
                     onMouseLeave={e=>{e.currentTarget.style.background='#fff';e.currentTarget.style.borderColor='#e0e0e0';}}>{icon}</button>
                ))}
              </div>
            </div>
          </div>

          {/* Form */}
          <div style={{background:'#F8F8F8',borderRadius:'24px',padding:'48px'}}>
            {submitted ? (
              <div style={{textAlign:'center',padding:'40px 0'}}>
                <div style={{fontSize:'64px',marginBottom:'20px'}}>✅</div>
                <h3 style={{fontFamily:'Bebas Neue,cursive',fontSize:'2rem',marginBottom:'12px',letterSpacing:'0.04em'}}>MESSAGE SENT!</h3>
                <p style={{color:'#666',lineHeight:'1.7',marginBottom:'24px'}}>
                  Thanks {form.name}! We'll reach out within 2 hours to schedule your first consultation call.
                </p>
                <button className="btn-primary" onClick={() => { setSubmitted(false); setForm({name:'',email:'',phone:'',service:'',message:''}); }}
                  style={{padding:'14px 32px',borderRadius:'10px',border:'none',cursor:'pointer',fontSize:'0.88rem'}}>
                  Send Another Message
                </button>
              </div>
            ) : (
              <form onSubmit={handleSubmit}>
                <h2 style={{fontFamily:'Bebas Neue,cursive',fontSize:'1.8rem',letterSpacing:'0.04em',marginBottom:'8px'}}>BOOK YOUR FIRST CONSULTATION CALL</h2>
                <p style={{color:'#9E9E9E',fontSize:'0.88rem',marginBottom:'32px'}}>Fill out the form and we'll call you back within 2 hours.</p>

                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px',marginBottom:'16px'}}>
                  {[{name:'name',placeholder:'Full Name *',type:'text',required:true},{name:'email',placeholder:'Email Address *',type:'email',required:true}].map(f=>(
                    <input key={f.name} name={f.name} type={f.type} placeholder={f.placeholder} required={f.required}
                      value={form[f.name]} onChange={handleChange}
                      style={{padding:'14px 16px',borderRadius:'10px',border:'1px solid #e0e0e0',
                        fontSize:'0.9rem',background:'#fff',width:'100%',transition:'border 0.2s'}}/>
                  ))}
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px',marginBottom:'16px'}}>
                  <input name="phone" type="tel" placeholder="Phone Number" value={form.phone} onChange={handleChange}
                    style={{padding:'14px 16px',borderRadius:'10px',border:'1px solid #e0e0e0',fontSize:'0.9rem',background:'#fff'}}/>
                  <select name="service" value={form.service} onChange={handleChange}
                    style={{padding:'14px 16px',borderRadius:'10px',border:'1px solid #e0e0e0',fontSize:'0.9rem',background:'#fff',color:form.service?'#333':'#9E9E9E',cursor:'pointer'}}>
                    <option value="">Service Interested In</option>
                    <option>Personal Training</option>
                    <option>Diet Plan</option>
                    <option>Ayurvedic Consultation</option>
                    <option>Products</option>
                    <option>All Services</option>
                  </select>
                </div>
                <textarea name="message" placeholder="Tell us about your goals, current challenges, and what transformation means to you..." value={form.message} onChange={handleChange}
                  rows={4} style={{width:'100%',padding:'14px 16px',borderRadius:'10px',border:'1px solid #e0e0e0',
                    fontSize:'0.9rem',background:'#fff',resize:'vertical',marginBottom:'24px',fontFamily:'inherit'}}/>

                <button type="submit" className="btn-primary" style={{
                  width:'100%',padding:'16px',borderRadius:'10px',border:'none',cursor:'pointer',fontSize:'0.95rem',
                  display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',
                  opacity: loading ? 0.7 : 1
                }}>
                  {loading ? '⏳ Sending...' : 'Book Your First Consultation Call →'}
                </button>
                <p style={{textAlign:'center',marginTop:'12px',fontSize:'0.78rem',color:'#9E9E9E'}}>
                  🔒 Your information is 100% private. No spam, ever.
                </p>
              </form>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ===================== CART PAGE ===================== */
function CartPage({ cart, setCart, setPage }) {
  const navigate = (p) => { setPage(p); window.scrollTo(0,0); };
  const total = cart.reduce((sum,item) => sum + item.product.price * item.qty, 0);
  const removeItem = (id) => setCart(c => c.filter(i=>i.product.id !== id));
  const updateQty = (id, delta) => setCart(c => c.map(i => i.product.id===id ? {...i,qty:Math.max(1,i.qty+delta)} : i));

  return (
    <div className="page-enter" style={{paddingTop:'70px',minHeight:'100vh',background:'#F8F8F8'}}>
      <div style={{maxWidth:'900px',margin:'0 auto',padding:'48px 24px'}}>
        <h1 className="section-heading" style={{fontSize:'3rem',marginBottom:'8px'}}>YOUR CART</h1>
        <p style={{color:'#9E9E9E',marginBottom:'40px'}}>{cart.length} item{cart.length!==1?'s':''}</p>
        {cart.length === 0 ? (
          <div style={{textAlign:'center',padding:'80px 24px',background:'#fff',borderRadius:'24px'}}>
            <div style={{fontSize:'64px',marginBottom:'16px'}}>🛒</div>
            <h3 style={{fontFamily:'Bebas Neue,cursive',fontSize:'2rem',marginBottom:'12px'}}>YOUR CART IS EMPTY</h3>
            <p style={{color:'#9E9E9E',marginBottom:'28px'}}>Add some powerful Ayurvedic products to get started.</p>
            <button className="btn-primary" onClick={() => navigate('Products')}
              style={{padding:'14px 36px',borderRadius:'10px',border:'none',cursor:'pointer',fontSize:'0.9rem'}}>
              Shop Products
            </button>
          </div>
        ) : (
          <div style={{display:'grid',gridTemplateColumns:'1fr 320px',gap:'24px'}}>
            <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
              {cart.map(({product,qty}) => (
                <div key={product.id} style={{background:'#fff',borderRadius:'16px',padding:'20px',display:'flex',gap:'16px',alignItems:'center'}}>
                  <div style={{width:'80px',height:'80px',borderRadius:'12px',overflow:'hidden',background:'#f8f8f8',flexShrink:0}}>
                    <ProductImage src={product.image} alt={product.name} style={{width:'100%',height:'100%',display:'block'}} fit="contain" />
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:'700',fontSize:'0.95rem',marginBottom:'4px'}}>{product.name}</div>
                    <div style={{color:'#9E9E9E',fontSize:'0.8rem',marginBottom:'10px'}}>{product.weight}</div>
                    <div style={{display:'flex',alignItems:'center',gap:'12px',flexWrap:'wrap'}}>
                      <div style={{display:'flex',alignItems:'center',border:'1px solid #e0e0e0',borderRadius:'8px',overflow:'hidden'}}>
                        <button onClick={()=>updateQty(product.id,-1)} style={{width:'32px',height:'32px',border:'none',background:'#F8F8F8',cursor:'pointer',fontWeight:'700'}}>−</button>
                        <span style={{padding:'0 12px',fontWeight:'700'}}>{qty}</span>
                        <button onClick={()=>updateQty(product.id,1)} style={{width:'32px',height:'32px',border:'none',background:'#F8F8F8',cursor:'pointer',fontWeight:'700'}}>+</button>
                      </div>
                      <span style={{fontWeight:'800',fontSize:'1rem'}}>₹{product.price * qty}</span>
                      <button onClick={()=>removeItem(product.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#f44336',fontWeight:'700',fontSize:'0.8rem',marginLeft:'auto'}}>Remove</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
            <div style={{background:'#fff',borderRadius:'16px',padding:'28px',height:'fit-content',position:'sticky',top:'90px'}}>
              <h3 style={{fontFamily:'Bebas Neue,cursive',fontSize:'1.4rem',letterSpacing:'0.04em',marginBottom:'20px'}}>ORDER SUMMARY</h3>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:'12px',fontSize:'0.9rem',color:'#666'}}>
                <span>Subtotal</span><span>₹{total}</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:'12px',fontSize:'0.9rem',color:'#666'}}>
                <span>Shipping</span><span style={{color:'#2e7d32',fontWeight:'700'}}>{total >= 999 ? 'FREE' : '₹99'}</span>
              </div>
              {total < 999 && <div style={{background:'#FFF3E0',borderRadius:'8px',padding:'10px 12px',fontSize:'0.8rem',color:'#F57C00',marginBottom:'16px',fontWeight:'600'}}>
                Add ₹{999-total} more for FREE shipping!
              </div>}
              <div style={{borderTop:'1px solid #f0f0f0',paddingTop:'16px',marginBottom:'20px',display:'flex',justifyContent:'space-between',fontWeight:'900',fontSize:'1.1rem'}}>
                <span>Total</span><span>₹{total + (total >= 999 ? 0 : 99)}</span>
              </div>
              <button className="btn-primary pulse-orange" style={{width:'100%',padding:'16px',borderRadius:'10px',border:'none',cursor:'pointer',fontSize:'0.9rem',marginBottom:'12px'}}>
                Proceed to Checkout
              </button>
              <button onClick={() => navigate('Products')} style={{width:'100%',padding:'12px',borderRadius:'10px',border:'1px solid #e0e0e0',cursor:'pointer',fontSize:'0.85rem',background:'#fff',color:'#666',fontWeight:'600'}}>
                Continue Shopping
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ===================== APP ROOT ===================== */
function App() {
  const [page, setPage] = useState('Home');
  const [selectedProduct, setSelectedProduct] = useState(null);
  const [cart, setCart] = useState([]);

  useEffect(() => {
    PRODUCTS.forEach((product) => {
      validateProductImagePath(product.image, product.name);
    });
  }, []);

  const addToCart = (product, qty=1) => {
    setCart(prev => {
      const existing = prev.find(i => i.product.id === product.id);
      if(existing) return prev.map(i => i.product.id===product.id ? {...i,qty:i.qty+qty} : i);
      return [...prev, {product, qty}];
    });
  };

  const cartCount = cart.reduce((s,i) => s+i.qty, 0);

  return (
    <div>
      <Navbar page={page} setPage={setPage} cartCount={cartCount} />
      {page === 'Home' && <HomePage setPage={setPage} setSelectedProduct={setSelectedProduct} />}
      {page === 'Products' && <ProductsPage setPage={setPage} setSelectedProduct={setSelectedProduct} />}
      {page === 'ProductDetail' && <ProductDetailPage product={selectedProduct} setPage={setPage} addToCart={addToCart} />}
      {page === 'Services' && <ServicesPage setPage={setPage} />}
      {page === 'About' && <AboutPage setPage={setPage} />}
      {page === 'Contact' && <ContactPage />}
      {page === 'Cart' && <CartPage cart={cart} setCart={setCart} setPage={setPage} />}
      <Footer setPage={setPage} />
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
